name: workflows

services:
  redis:
    image: redis/redis-stack
    container_name: workflows-redis
    volumes:
      - redis:/data
    ports:
      - 6379:6379
      - 8001:8001

  rabbitmq:
    container_name: workflows-rabbitmq
    image: rabbitmq:4-management
    ports:
      - 5672:5672
      - 15672:15672

volumes:
  redis:
